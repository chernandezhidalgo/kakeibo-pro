name: kakeibo_pro
description: KakeiboPro — App de finanzas familiares para la familia Hernandez-Romero
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.11.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegacion
  go_router: ^14.6.2

  # Base de datos local
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  # SQLCipher reemplaza sqlite3_flutter_libs para encriptación en reposo
  sqlcipher_flutter_libs: ^0.5.4
  sqlite3: ^2.7.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Supabase
  supabase_flutter: ^2.8.4

  # Seguridad
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # Sync en background
  workmanager: ^0.5.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

  # Notificaciones
  flutter_local_notifications: ^18.0.1

  # Conectividad
  connectivity_plus: ^6.1.1

  # Utilidades
  intl: ^0.20.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0

  # Monitoreo de errores
  sentry_flutter: ^8.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Generadores de codigo
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
