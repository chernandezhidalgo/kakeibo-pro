name: Build Android (App Bundle)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign AAB
    runs-on: ubuntu-latest

    steps:
      # 1. Código fuente
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (requerido por Gradle 8+)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Flutter estable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      # 4. Dependencias Dart
      - name: Install dependencies
        run: flutter pub get

      # 5. Reconstruir código generado (Drift, Riverpod, Freezed)
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # 6. Análisis estático
      - name: Flutter analyze
        run: flutter analyze

      # 7. Pruebas unitarias
      - name: Flutter test
        run: flutter test

      # 8. Decodificar keystore desde Secret de GitHub
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/kakeibopro-release.jks

      # 9. Crear key.properties con los secrets
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storeFile=../kakeibopro-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # 10. Build App Bundle firmado
      - name: Build release AAB
        run: flutter build appbundle --release \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          --dart-define=REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }} \
          --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
          --dart-define=APP_ENV=production

      # 11. Subir AAB como artefacto
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kakeibopro-release-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
